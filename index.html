<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Famous Quotes</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CN46NY6W4X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-CN46NY6W4X');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-dark:    #032d60;
      --brand:         #0176d3;
      --brand-light:   #1b96ff;
      --brand-bg:      #f3f8fe;
      --neutral-1:     #fafafa;
      --neutral-2:     #f3f3f3;
      --neutral-3:     #dddbda;
      --neutral-6:     #706e6b;
      --neutral-9:     #181818;
      --success:       #2e844a;
      --warning:       #fe9339;
      --radius:        0.5rem;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
      --shadow-md:     0 4px 12px rgba(0,0,0,.12);
      --shadow-lg:     0 8px 24px rgba(0,0,0,.14);
    }

    body {
      font-family: 'Salesforce Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--neutral-2);
      color: var(--neutral-9);
      min-height: 100vh;
    }

    /* ── NAV BAR ── */
    .nav {
      background: var(--brand-dark);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .nav-logo svg { width: 28px; height: 28px; }
    .nav-logo span {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .nav-spacer { flex: 1; }
    .nav-badge {
      background: var(--brand-light);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.05em;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
      padding: 2.5rem 2rem 2rem;
      color: #fff;
    }
    .page-header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .page-header p {
      font-size: 0.95rem;
      opacity: 0.8;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--neutral-3);
      padding: 0.75rem 2rem;
    }
    .toolbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--neutral-3);
      border-radius: var(--radius);
      background: var(--neutral-1);
      padding: 0 0.75rem;
      gap: 0.5rem;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(1,118,211,.18);
    }
    .search-box svg { color: var(--neutral-6); flex-shrink: 0; }
    .search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.875rem;
      padding: 0.5rem 0;
      width: 100%;
      color: var(--neutral-9);
    }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      border: 1px solid var(--neutral-3);
      border-radius: 99px;
      background: #fff;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--neutral-6);
      transition: all .15s;
    }
    .filter-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
    }
    .filter-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .count-label { font-size: 0.8rem; color: var(--neutral-6); white-space: nowrap; }

    /* ── MAIN ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
    }

    /* ── FEATURED CARD ── */
    .featured-section { margin-bottom: 2rem; }
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--neutral-6);
      margin-bottom: 0.75rem;
    }
    .featured-card {
      background: linear-gradient(135deg, #032d60, #0176d3);
      color: #fff;
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .featured-card::before {
      content: '\201C';
      position: absolute;
      top: -0.5rem;
      left: 1.5rem;
      font-size: 9rem;
      line-height: 1;
      opacity: 0.12;
      font-family: Georgia, serif;
    }
    .featured-card .quote-text {
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.55;
      margin-bottom: 1.25rem;
      position: relative;
    }
    .featured-card .quote-author {
      font-size: 0.9rem;
      opacity: 0.85;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .featured-card .quote-author::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 2px;
      background: rgba(255,255,255,.6);
    }
    .featured-card .category-tag {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
    }
    .featured-card .shuffle-btn {
      margin-top: 1.25rem;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      border-radius: var(--radius);
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .featured-card .shuffle-btn:hover { background: rgba(255,255,255,.25); }

    /* ── QUOTE GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .quote-card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--neutral-3);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, transform .2s;
      animation: fadeIn .3s ease both;
    }
    .quote-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 99px;
    }
    .cat-pill.wisdom   { background: #eef4ff; color: #1b5fcc; }
    .cat-pill.courage  { background: #fef4e6; color: #a86200; }
    .cat-pill.success  { background: #eaf5ea; color: var(--success); }
    .cat-pill.love     { background: #fff0f0; color: #c23934; }
    .cat-pill.life     { background: #f4f0ff; color: #6138c2; }
    .cat-pill.change   { background: #e8f9f1; color: #1d6348; }

    .like-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--neutral-3);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      transition: color .15s;
      padding: 0;
    }
    .like-btn:hover { color: #c23934; }
    .like-btn.liked { color: #c23934; }
    .like-btn svg { width: 16px; height: 16px; }

    .card-quote {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--neutral-9);
      flex: 1;
      quotes: '\201C' '\201D';
    }
    .card-quote::before { content: open-quote; color: var(--brand); font-size: 1.4em; line-height: 0; vertical-align: -0.3em; margin-right: 2px; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--neutral-2);
      padding-top: 0.75rem;
    }
    .author-block { display: flex; align-items: center; gap: 0.6rem; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .author-name { font-size: 0.8rem; font-weight: 700; color: var(--neutral-9); }
    .author-meta { font-size: 0.72rem; color: var(--neutral-6); }

    .copy-btn {
      background: none;
      border: 1px solid var(--neutral-3);
      border-radius: var(--radius);
      cursor: pointer;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--neutral-6);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: all .15s;
    }
    .copy-btn:hover { border-color: var(--brand); color: var(--brand); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--neutral-6);
      display: none;
    }
    .empty-state svg { opacity: .3; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1rem; margin-bottom: 0.4rem; color: var(--neutral-9); }
    .empty-state p { font-size: 0.875rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--brand-dark);
      color: #fff;
      border-radius: var(--radius);
      padding: 0.65rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      .main { padding: 1rem; }
      .featured-card { padding: 1.5rem; }
      .featured-card .quote-text { font-size: 1.1rem; }
      .page-header { padding: 1.5rem 1rem 1.25rem; }
      .toolbar { padding: 0.6rem 1rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="#">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="#1b96ff"/>
      <path d="M9 13.5l3.5 3.5 6.5-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>QuoteForce</span>
  </a>
  <span class="nav-spacer"></span>
  <span class="nav-badge">Lightning</span>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <h1>Famous Quotes</h1>
    <p>Wisdom from the world's greatest minds — curated for inspiration.</p>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="명언 또는 인물 검색…" autocomplete="off" />
    </div>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="wisdom">Wisdom</button>
      <button class="filter-btn" data-cat="courage">Courage</button>
      <button class="filter-btn" data-cat="success">Success</button>
      <button class="filter-btn" data-cat="life">Life</button>
      <button class="filter-btn" data-cat="love">Love</button>
      <button class="filter-btn" data-cat="change">Change</button>
    </div>
    <div class="toolbar-right">
      <span class="count-label" id="countLabel"></span>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- FEATURED -->
  <section class="featured-section">
    <p class="section-label">Today's Featured Quote</p>
    <div class="featured-card" id="featuredCard">
      <span class="category-tag" id="featuredCat"></span>
      <p class="quote-text" id="featuredText"></p>
      <p class="quote-author" id="featuredAuthor"></p>
      <button class="shuffle-btn" id="shuffleBtn">
        ↻ &nbsp;New Quote
      </button>
    </div>
  </section>

  <!-- GRID -->
  <p class="section-label">All Quotes</p>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 0 1 5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
    </svg>
    <h3>검색 결과가 없습니다</h3>
    <p>다른 검색어나 카테고리를 시도해보세요.</p>
  </div>

</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
  </svg>
  클립보드에 복사되었습니다!
</div>

<script>
const QUOTES = [
  { id:1,  text:"The only way to do great work is to love what you do.",              author:"Steve Jobs",         role:"Co-founder of Apple",         cat:"success", color:"#0176d3" },
  { id:2,  text:"In the middle of every difficulty lies opportunity.",                author:"Albert Einstein",    role:"Theoretical Physicist",        cat:"wisdom",  color:"#6138c2" },
  { id:3,  text:"It does not matter how slowly you go as long as you do not stop.",   author:"Confucius",          role:"Chinese Philosopher",          cat:"courage", color:"#a86200" },
  { id:4,  text:"Life is what happens when you're busy making other plans.",          author:"John Lennon",        role:"Musician & Activist",          cat:"life",    color:"#c23934" },
  { id:5,  text:"The future belongs to those who believe in the beauty of their dreams.", author:"Eleanor Roosevelt", role:"Former U.S. First Lady",    cat:"success", color:"#0176d3" },
  { id:6,  text:"Spread love everywhere you go. Let no one ever come to you without leaving happier.", author:"Mother Teresa", role:"Nobel Peace Prize Laureate", cat:"love", color:"#c23934" },
  { id:7,  text:"When you reach the end of your rope, tie a knot in it and hang on.", author:"Franklin D. Roosevelt", role:"32nd U.S. President",      cat:"courage", color:"#a86200" },
  { id:8,  text:"Always remember that you are absolutely unique. Just like everyone else.", author:"Margaret Mead", role:"Cultural Anthropologist",     cat:"life",    color:"#6138c2" },
  { id:9,  text:"Don't judge each day by the harvest you reap but by the seeds that you plant.", author:"Robert Louis Stevenson", role:"Scottish Novelist", cat:"wisdom", color:"#1b5fcc" },
  { id:10, text:"The best time to plant a tree was 20 years ago. The second best time is now.", author:"Chinese Proverb", role:"Ancient Wisdom",         cat:"change",  color:"#1d6348" },
  { id:11, text:"An unexamined life is not worth living.",                            author:"Socrates",           role:"Greek Philosopher",           cat:"wisdom",  color:"#6138c2" },
  { id:12, text:"Be yourself; everyone else is already taken.",                       author:"Oscar Wilde",        role:"Irish Playwright & Poet",     cat:"life",    color:"#6138c2" },
  { id:13, text:"Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", author:"Albert Einstein", role:"Theoretical Physicist", cat:"wisdom", color:"#1b5fcc" },
  { id:14, text:"Be the change you wish to see in the world.",                        author:"Mahatma Gandhi",     role:"Indian Independence Leader",  cat:"change",  color:"#1d6348" },
  { id:15, text:"The journey of a thousand miles begins with one step.",              author:"Lao Tzu",            role:"Ancient Chinese Philosopher",  cat:"courage", color:"#a86200" },
  { id:16, text:"That which does not kill us makes us stronger.",                     author:"Friedrich Nietzsche", role:"German Philosopher",         cat:"courage", color:"#a86200" },
  { id:17, text:"In three words I can sum up everything I've learned about life: it goes on.", author:"Robert Frost", role:"American Poet",             cat:"life",    color:"#c23934" },
  { id:18, text:"To love and be loved is to feel the sun from both sides.",           author:"David Viscott",      role:"Psychiatrist & Author",       cat:"love",    color:"#c23934" },
  { id:19, text:"Success is not final, failure is not fatal: it is the courage to continue that counts.", author:"Winston Churchill", role:"Former British Prime Minister", cat:"success", color:"#0176d3" },
  { id:20, text:"The only impossible journey is the one you never begin.",            author:"Tony Robbins",       role:"Life Coach & Author",         cat:"change",  color:"#1d6348" },
  { id:21, text:"You must be the change you wish to see in the world.",               author:"Mahatma Gandhi",     role:"Indian Independence Leader",  cat:"change",  color:"#1d6348" },
  { id:22, text:"Darkness cannot drive out darkness; only light can do that.",        author:"Martin Luther King Jr.", role:"Civil Rights Leader",      cat:"wisdom",  color:"#1b5fcc" },
  { id:23, text:"We accept the love we think we deserve.",                            author:"Stephen Chbosky",    role:"American Author",             cat:"love",    color:"#c23934" },
  { id:24, text:"Not all those who wander are lost.",                                 author:"J.R.R. Tolkien",     role:"English Author",              cat:"life",    color:"#6138c2" },
];

let likes = {};
let currentFilter = 'all';
let currentSearch = '';
let featuredIdx = 0;

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function getFiltered() {
  return QUOTES.filter(q => {
    const matchCat = currentFilter === 'all' || q.cat === currentFilter;
    const s = currentSearch.toLowerCase();
    const matchSearch = !s || q.text.toLowerCase().includes(s) || q.author.toLowerCase().includes(s);
    return matchCat && matchSearch;
  });
}

function renderFeatured() {
  const q = QUOTES[featuredIdx];
  document.getElementById('featuredText').textContent = q.text;
  document.getElementById('featuredAuthor').textContent = q.author + ' — ' + q.role;
  document.getElementById('featuredCat').textContent = q.cat.charAt(0).toUpperCase() + q.cat.slice(1);
}

function renderGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('countLabel');

  label.textContent = filtered.length + ' quotes';

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((q, i) => `
    <div class="quote-card" style="animation-delay:${i * 0.04}s">
      <div class="card-top">
        <span class="cat-pill ${q.cat}">${q.cat.charAt(0).toUpperCase()+q.cat.slice(1)}</span>
        <button class="like-btn ${likes[q.id] ? 'liked' : ''}" data-id="${q.id}" title="Like">
          <svg viewBox="0 0 24 24" fill="${likes[q.id] ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          ${likes[q.id] || ''}
        </button>
      </div>
      <p class="card-quote">${q.text}</p>
      <div class="card-footer">
        <div class="author-block">
          <div class="avatar" style="background:${q.color}">${initials(q.author)}</div>
          <div>
            <div class="author-name">${q.author}</div>
            <div class="author-meta">${q.role}</div>
          </div>
        </div>
        <button class="copy-btn" data-text="${q.text.replace(/"/g,'&quot;')} — ${q.author}">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
    </div>
  `).join('');
}

// Events
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderGrid();
});

document.getElementById('filterGroup').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.cat;
  renderGrid();
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  featuredIdx = (featuredIdx + Math.floor(Math.random() * (QUOTES.length - 1)) + 1) % QUOTES.length;
  renderFeatured();
});

document.getElementById('grid').addEventListener('click', e => {
  // Like
  const likeBtn = e.target.closest('.like-btn');
  if (likeBtn) {
    const id = Number(likeBtn.dataset.id);
    likes[id] = likes[id] ? 0 : 1;
    renderGrid();
    return;
  }
  // Copy
  const copyBtn = e.target.closest('.copy-btn');
  if (copyBtn) {
    const text = copyBtn.dataset.text;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Copied!`;
      showToast();
      setTimeout(() => { copyBtn.classList.remove('copied'); renderGrid(); }, 2000);
    });
  }
});

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
featuredIdx = Math.floor(Math.random() * QUOTES.length);
renderFeatured();
renderGrid();
</script>
</body>
</html>
